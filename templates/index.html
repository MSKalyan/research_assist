<!DOCTYPE html>
<html>
<head>
    <title>Research Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { text-align: center; color: #60a5fa; margin-bottom: 30px; font-size: 2em; }
        .card { background: #1e293b; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .drop-zone { border: 2px dashed #60a5fa; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: #334155; }
        .drop-zone.dragover { background: #1e3a5f; border-color: #3b82f6; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #64748b; cursor: not-allowed; }
        textarea { width: 100%; height: 80px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; padding: 15px; font-size: 16px; resize: vertical; }
        textarea:focus { border-color: #60a5fa; outline: none; }
        .response { margin-top: 20px; padding: 20px; background: #0f172a; border-radius: 12px; border-left: 4px solid #3b82f6; line-height: 1.8; }
        .sources { margin-top: 15px; }
        .source-item { display: inline-block; background: #334155; padding: 8px 16px; border-radius: 20px; margin: 5px; font-size: 14px; }
        .hidden { display: none; }
        .loading { color: #60a5fa; }
        .file-info { margin-top: 10px; color: #94a3b8; font-size: 14px; }
        h2 { color: #94a3b8; margin-bottom: 15px; }
        #chatHistory { height: 300px; overflow-y: auto; background: #0f172a; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .msg.user { background: #334155; text-align: right; }
        .msg.assistant { background: #1e293b; }
        .msg strong { display: block; margin-bottom: 5px; }
        .msg.user strong { color: #60a5fa; }
        .msg.assistant strong { color: #10b981; }
        .sources-bar { font-size: 12px; margin-top: 8px; }
        .sources-bar span { margin-right: 8px; padding: 2px 8px; background: #334155; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Research Assistant</h1>
    
    <div class="card">
        <h2>Upload Documents</h2>
        <div class="drop-zone" id="dropZone">
            <p>Drag & drop PDF/TXT files here</p>
            <p style="color: #64748b; margin-top: 10px;">or click to browse</p>
            <input type="file" id="fileInput" accept=".pdf,.txt,.md" style="display: none;" multiple>
        </div>
        <button class="btn" onclick="uploadFiles()">Upload Files</button>
        <div id="fileInfo" class="file-info"></div>
    </div>
    
    <div class="card">
        <h2>Chat <button class="btn" style="padding: 5px 12px; margin-left: 10px; font-size: 12px;" onclick="newChat()">New Chat</button></h2>
        <div id="chatHistory"></div>
        <textarea id="question" placeholder="Type your question and press Enter..."></textarea>
        <button class="btn" id="sendBtn" onclick="askQuestion()">Send</button>
        
        <div id="loading" class="loading hidden">Processing...</div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const chatHistory = document.getElementById('chatHistory');
    const questionInput = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');
    let uploadedFiles = [];
    let threadId = localStorage.getItem('chat_thread_id') || 'thread-' + Date.now();
    localStorage.setItem('chat_thread_id', threadId);
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatContent(content) {
        return escapeHtml(content)
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
    }
    
    function addMessage(role, content, sources) {
        const msg = document.createElement('div');
        msg.className = 'msg ' + role;
        const label = role === 'user' ? 'You' : 'Assistant';
        let html = '<strong>' + label + '</strong>' + formatContent(content);
        if (sources && role === 'assistant') {
            html += '<div class="sources-bar"><span>LLM: ' + sources.llm_pct + '%</span><span>RAG: ' + sources.rag_pct + '%</span><span>Web: ' + sources.web_pct + '%</span></div>';
        }
        msg.innerHTML = html;
        chatHistory.appendChild(msg);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
    
    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        fileInput.files = e.dataTransfer.files;
        uploadedFiles = Array.from(fileInput.files);
        document.getElementById('fileInfo').textContent = uploadedFiles.map(f => f.name).join(', ');
    });
    
    fileInput.addEventListener('change', () => {
        uploadedFiles = Array.from(fileInput.files);
        document.getElementById('fileInfo').textContent = uploadedFiles.map(f => f.name).join(', ');
    });
    
    async function uploadFiles() {
        if (uploadedFiles.length === 0) {
            alert('Please select files first');
            return;
        }
        
        const formData = new FormData();
        uploadedFiles.forEach(f => formData.append('files', f));
        
        document.getElementById('fileInfo').textContent = 'Uploading...';
        
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.status === 'success') {
            document.getElementById('fileInfo').textContent = 'Uploaded ' + data.files.length + ' files! Ingesting...';
            uploadedFiles = [];
            fileInput.value = '';
            fetch('/reingest', { method: 'POST' });
        }
    }
    
    function newChat() {
        if (confirm('Start a new chat? Current conversation will be saved.')) {
            threadId = 'thread-' + Date.now();
            localStorage.setItem('chat_thread_id', threadId);
            chatHistory.innerHTML = '';
        }
    }
    
    questionInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            askQuestion();
        }
    });
    
    async function askQuestion() {
        const question = questionInput.value.trim();
        if (!question) return;
        
        questionInput.value = '';
        addMessage('user', question);
        sendBtn.disabled = true;
        
        document.getElementById('loading').classList.remove('hidden');
        
        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ question, thread_id: threadId })
            });
            const data = await res.json();
            
            document.getElementById('loading').classList.add('hidden');
            sendBtn.disabled = false;
            
            if (data.error) {
                addMessage('assistant', 'Error: ' + data.error);
            } else {
                const sources = { llm_pct: data.llm_pct, rag_pct: data.rag_pct, web_pct: data.web_pct };
                addMessage('assistant', data.answer || 'No answer generated', sources);
            }
        } catch (err) {
            document.getElementById('loading').classList.add('hidden');
            sendBtn.disabled = false;
            addMessage('assistant', 'Error: ' + err.message);
        }
    }
</script>
</body>
</html>
